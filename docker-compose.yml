services:
  redis:
    image: redis/redis-stack:7.4.0-v7
    container_name: redis
    ports:
      - "6379:6379"
      - "8001:8001" # Insight
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
    volumes:
      - redis_data:/data
      - ./server/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - pltgm-network

  server:
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=${SERVER_PORT:-3001}
      - CLIENT_PORT=${CLIENT_PORT:-5174}
    ports:
      - "${SERVER_PORT:-3001}:${SERVER_PORT:-3001}"
    build:
      context: server
      dockerfile: Dockerfile
    depends_on:
      - redis
    volumes:
      - ./server/src:/app/src
    networks:
      - pltgm-network

  client:
    environment:
      - VITE_SERVER_INTERNAL_URL=${SERVER_INTERNAL_URL:-http://server:3001}
      - VITE_CLIENT_PORT=${CLIENT_PORT:-5174}
    depends_on:
      - server
    ports:
      - "5174:5174"
    build:
      context: client
      dockerfile: Dockerfile
    volumes:
      - ./client/src:/app/src # Remove for prod; replace with file copy.
      - ./server/src/common:/server/src/common
    networks:
      - pltgm-network

volumes:
  redis_data:

networks:
  pltgm-network:
    driver: bridge
