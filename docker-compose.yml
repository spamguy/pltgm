services:
  server:
    environment:
      - SERVER_PORT=${SERVER_PORT:-3001}
      - CLIENT_PORT=${CLIENT_PORT:-5174}
      - DB_PATH=${DB_PATH:-/data/pltgm.db}
    ports:
      - "${SERVER_PORT:-3001}:${SERVER_PORT:-3001}"
    build:
      context: server
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./server/src:/app/src
      - sqlite_data:/data
    networks:
      - pltgm-network

  client:
    environment:
      - VITE_SERVER_INTERNAL_URL=${SERVER_INTERNAL_URL:-http://server:3001}
      - VITE_CLIENT_PORT=${CLIENT_PORT:-5174}
    depends_on:
      - server
    ports:
      - "5174:5174"
    build:
      context: .
      dockerfile: client/Dockerfile
      target: dev
    volumes:
      - ./client/src:/app/src
      - ./server/src/common:/server/src/common
    networks:
      - pltgm-network

volumes:
  sqlite_data:
    driver: local

networks:
  pltgm-network:
    driver: bridge
